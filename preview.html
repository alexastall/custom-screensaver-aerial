<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerial Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #111111;
            --bg-hover: #1a1a1a;
            --text-primary: #f0f0f0;
            --text-secondary: #bbbbbb;
            --text-muted: #777777;
            --accent: #ffffff;
            --accent-dim: #cccccc;
            --border: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Text', serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .header {
            padding: 4rem 2rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }

        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.2rem;
            font-weight: 300;
            letter-spacing: 0.08em;
            color: var(--accent);
            margin-bottom: 0.4rem;
        }

        .header p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 2.5rem;
        }

        .stat-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.7rem;
            font-weight: 600;
            color: var(--accent);
        }

        .controls {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1.6rem 2rem;
            z-index: 100;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box { flex: 1; min-width: 260px; }
        .search-box input {
            width: 100%;
            padding: 0.85rem 1.2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 1rem;
            border-radius: 4px;
        }
        .search-box input:focus {
            border-color: var(--accent);
            outline: none;
        }

        .language-selector {
            padding: 0.75rem 1.2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: 'Cormorant Garamond', serif;   /* ← Fixed: elegant font */
            font-size: 1.05rem;
            font-weight: 400;
            border-radius: 4px;
            min-width: 240px;
        }

        .filter-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .filter-btn, .quality-btn {
            padding: 0.7rem 1.4rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .filter-btn:hover, .quality-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .filter-btn.active, .quality-btn.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        .gallery {
            padding: 2.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2.4rem;
        }
        .gallery.list-view {
            grid-template-columns: 1fr;
            max-width: 1300px;
            margin: 0 auto;
        }

        .video-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            overflow: hidden;
            border-radius: 6px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .video-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent-dim);
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.08);
        }

        .video-preview {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #000;
            transition: transform 0.5s ease;
        }
        .video-card:hover .video-preview {
            transform: scale(1.04);
        }

        .video-info { padding: 1.7rem; }
        .video-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 0.7rem;
        }
        .video-description {
            color: var(--text-secondary);
            margin-bottom: 1.3rem;
            line-height: 1.55;
        }

        .quality-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .quality-badge {
            padding: 5px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--accent);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 1000;
            padding: 2rem;
            overflow-y: auto;
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 1400px;
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2.4rem;
        }

        .quality-links {
            margin-top: 2rem;
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .quality-link {
            padding: 0.7rem 1.4rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.93rem;
            transition: all 0.3s ease;
        }
        .quality-link:hover {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        .poi-section {
            margin-top: 2.8rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }
        .poi-section h3 {
            color: var(--accent);
            margin-bottom: 1.3rem;
        }

        .no-results {
            text-align: center;
            padding: 6rem 2rem;
            color: var(--text-muted);
            font-size: 1.35rem;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2.9rem; }
            .gallery { grid-template-columns: 1fr; gap: 2rem; padding: 1.5rem; }
            .controls { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="stats">
            <div class="stat">
                <span class="stat-number" id="totalVideos">—</span>
                <span class="stat-label">Videos</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="totalPOI">—</span>
                <span class="stat-label">Points of Interest</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="totalLocations">—</span>
                <span class="stat-label">Locations</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search locations, descriptions...">
        </div>

        <select id="languageSelect" class="language-selector"></select>

        <div class="filter-group">
            <button class="filter-btn active" data-quality="all">All Quality</button>
            <button class="filter-btn" data-quality="4K-HDR">4K HDR</button>
            <button class="filter-btn" data-quality="4K-SDR">4K SDR</button>
            <button class="filter-btn" data-quality="1080-HDR">1080p HDR</button>
        </div>

        <div class="view-toggle">
            <button class="quality-btn active" id="gridView">Grid</button>
            <button class="quality-btn" id="listView">List</button>
        </div>
    </div>

    <div class="gallery" id="gallery"></div>

    <div class="modal" id="videoModal">
        <div class="modal-content">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 2rem;">
                <div>
                    <h2 class="video-title" id="modalTitle"></h2>
                    <p class="video-description" id="modalDescription"></p>
                </div>
                <button class="close-modal" id="closeModal" style="background: none; border: none; color: var(--text-secondary); font-size: 2.4rem; cursor: pointer; line-height: 1;">×</button>
            </div>
            <video class="modal-video" id="modalVideo" controls style="width: 100%; max-height: 70vh; background: #000; border-radius: 6px;"></video>
            <div class="quality-links" id="modalQualityLinks"></div>
            <div class="poi-section" id="poiSection" style="display: none;">
                <h3>Points of Interest</h3>
                <div class="poi-list" id="poiList"></div>
            </div>
        </div>
    </div>

    <script>
        let videosData = [];
        let stringsData = {};
        let currentLanguage = 'en-US';
        let currentFilter = 'all';
        let searchQuery = '';

        const languageOptions = [
            {value: 'ar-AE', content: 'العربية'},
            {value: 'be-BY', content: 'Беларуская'},
            {value: 'ca-ES', content: 'Català'},
            {value: 'cs-CZ', content: 'Čeština'},
            {value: 'da-DK', content: 'Dansk'},
            {value: 'de-DE', content: 'Deutsch'},
            {value: 'el-GR', content: 'ελληνικά'},
            {value: 'en-AU', content: 'English (Australia)'},
            {value: 'en-GB', content: 'English (United Kingdom)'},
            {value: 'en-US', content: 'English (United States)'},
            {value: 'es-419', content: 'Español (Latinoamérica)'},
            {value: 'es-ES', content: 'Español'},
            {value: 'fi-FI', content: 'Suomi'},
            {value: 'fr-CA', content: 'Français (Canada)'},
            {value: 'fr-FR', content: 'Français'},
            {value: 'he-IL', content: 'עברית'},
            {value: 'hi-IN', content: 'हिन्दी'},
            {value: 'hr-HR', content: 'Hrvatski'},
            {value: 'hu-HU', content: 'Magyar'},
            {value: 'id-ID', content: 'Bahasa Indonesia'},
            {value: 'it-IT', content: 'Italiano'},
            {value: 'ja-JP', content: '日本語'},
            {value: 'ko-KR', content: '한국어'},
            {value: 'ms-MY', content: 'Bahasa Melayu'},
            {value: 'nb-NO', content: 'Norsk'},
            {value: 'nl-NL', content: 'Nederlands'},
            {value: 'pl-PL', content: 'Polski'},
            {value: 'pt-BR', content: 'Português (Brasil)'},
            {value: 'pt-PT', content: 'Português (Portugal)'},
            {value: 'ro-RO', content: 'Română'},
            {value: 'ru-RU', content: 'Русский'},
            {value: 'sk-SK', content: 'Slovenčina'},
            {value: 'sl-SI', content: 'Slovenščina'},
            {value: 'sv-SE', content: 'Svenska'},
            {value: 'th-TH', content: 'ไทย'},
            {value: 'tr-TR', content: 'Türkçe'},
            {value: 'uk-UA', content: 'Українська'},
            {value: 'vi-VN', content: 'Tiếng Việt'},
            {value: 'zh-CN', content: '中文 (中国大陆)'},
            {value: 'zh-HK', content: '中文（香港）'},
            {value: 'zh-TW', content: '中文 (台灣)'}
        ];

        async function loadData(language = 'en-US') {
            try {
                currentLanguage = language;
                const [videosResponse, stringsResponse] = await Promise.all([
                    fetch('https://raw.githubusercontent.com/aabytt/custom-screensaver-aerial/refs/heads/new-videos-json/assets/videos.json'),
                    fetch(`https://raw.githubusercontent.com/aabytt/custom-screensaver-aerial/refs/heads/new-videos-json/assets/locales/${language}.json`)
                ]);

                videosData = (await videosResponse.json()).assets;
                const stringsJson = await stringsResponse.json();
                stringsData = stringsJson.strings || stringsJson;

                populateLanguageSelector();
                updateStats();
                renderGallery();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('gallery').innerHTML = `<div class="no-results">Error loading data for ${language}</div>`;
            }
        }

        function populateLanguageSelector() {
            const select = document.getElementById('languageSelect');
            select.innerHTML = '';
            languageOptions.forEach(lang => {
                const option = document.createElement('option');
                option.value = lang.value;
                option.textContent = lang.content;
                if (lang.value === currentLanguage) option.selected = true;
                select.appendChild(option);
            });
        }

        function updateStats() {
            const totalPOI = videosData.reduce((sum, v) => sum + Object.keys(v.pointsOfInterest || {}).length, 0);
            const locations = new Set(videosData.map(v => stringsData[v.localizedNameKey] || v.localizedNameKey));

            document.getElementById('totalVideos').textContent = videosData.length;
            document.getElementById('totalPOI').textContent = totalPOI;
            document.getElementById('totalLocations').textContent = locations.size;
        }

        function getVideoName(video) {
            return stringsData[video.localizedNameKey] || video.localizedNameKey || 'Unknown Location';
        }

        function getPOIDescription(poiKey) {
            return stringsData[poiKey] || poiKey;
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function filterVideos() {
            return videosData.filter(video => {
                const name = getVideoName(video).toLowerCase();
                const matchesSearch = !searchQuery || name.includes(searchQuery.toLowerCase());
                const matchesQuality = currentFilter === 'all' || video[`url-${currentFilter}`] !== undefined;
                return matchesSearch && matchesQuality;
            });
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            const filtered = filterVideos();

            if (filtered.length === 0) {
                gallery.innerHTML = '<div class="no-results">No videos found matching your criteria.</div>';
                return;
            }

            gallery.innerHTML = filtered.map(video => {
                const name = getVideoName(video);
                const poiCount = Object.keys(video.pointsOfInterest || {}).length;
                const firstPOI = video.pointsOfInterest?.['0'];
                const description = firstPOI ? getPOIDescription(firstPOI) : 'Aerial view';

                let badgesHTML = '';
                if (video['url-4K-HDR']) badgesHTML += `<span class="quality-badge">4K HDR</span>`;
                if (video['url-4K-SDR']) badgesHTML += `<span class="quality-badge">4K SDR</span>`;
                if (video['url-4K-SDR-240FPS']) badgesHTML += `<span class="quality-badge">4K SDR 240FPS</span>`;
                if (video['url-1080-HDR']) badgesHTML += `<span class="quality-badge">1080 HDR</span>`;
                if (video['url-1080-SDR']) badgesHTML += `<span class="quality-badge">1080 SDR</span>`;
                if (video['url-1080-H264']) badgesHTML += `<span class="quality-badge">1080 H.264</span>`;

                return `
                    <div class="video-card" data-id="${video.id}">
                        <img class="video-preview" src="${video.previewImage}" alt="${name}" loading="lazy">
                        <div class="video-info">
                            <h3 class="video-title">${name}</h3>
                            <p class="video-description">${description}</p>
                            <div style="margin: 12px 0 8px;">
                                <span class="meta-tag" style="background: var(--bg-primary); color: var(--accent); padding: 4px 10px; border-radius: 3px; font-size: 0.85rem;">${poiCount} POI</span>
                            </div>
                            <div class="quality-badges">${badgesHTML}</div>
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.video-card').forEach(card => {
                card.addEventListener('click', () => {
                    const video = videosData.find(v => v.id === card.dataset.id);
                    if (video) openModal(video);
                });
            });
        }

        function openModal(video) {
            const modal = document.getElementById('videoModal');
            const name = getVideoName(video);
            const firstPOI = video.pointsOfInterest?.['0'];
            const description = firstPOI ? getPOIDescription(firstPOI) : 'Aerial view';

            document.getElementById('modalTitle').textContent = name;
            document.getElementById('modalDescription').textContent = description;

            const videoEl = document.getElementById('modalVideo');
            videoEl.src = video['url-1080-SDR'] || video['url-1080-H264'] || video['url-4K-SDR'] || video['url-4K-SDR-240FPS'];

            const qualityLinks = document.getElementById('modalQualityLinks');
            const qualities = [
                { label: '4K HDR', key: 'url-4K-HDR' },
                { label: '4K SDR', key: 'url-4K-SDR' },
                { label: '4K SDR 240FPS', key: 'url-4K-SDR-240FPS' },
                { label: '1080p HDR', key: 'url-1080-HDR' },
                { label: '1080p SDR', key: 'url-1080-SDR' },
                { label: '1080p H.264', key: 'url-1080-H264' }
            ];

            qualityLinks.innerHTML = qualities
                .filter(q => video[q.key])
                .map(q => `<a href="${video[q.key]}" class="quality-link" download>${q.label}</a>`)
                .join('');

            const poiSection = document.getElementById('poiSection');
            if (video.pointsOfInterest && Object.keys(video.pointsOfInterest).length > 0) {
                const poiList = document.getElementById('poiList');
                poiList.innerHTML = Object.entries(video.pointsOfInterest)
                    .sort((a, b) => parseInt(a[0]) - parseInt(b[0]))
                    .map(([time, key]) => `
                        <div class="poi-item" style="background: var(--bg-primary); padding: 1.2rem; border-left: 3px solid var(--accent-dim); margin-bottom: 0.8rem;">
                            <div class="poi-time" style="color: var(--accent); font-weight: 600; margin-bottom: 0.4rem;">${formatTime(parseInt(time))}</div>
                            <div style="color: var(--text-secondary);">${getPOIDescription(key)}</div>
                        </div>
                    `).join('');
                poiSection.style.display = 'block';
            } else {
                poiSection.style.display = 'none';
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('videoModal');
            const videoEl = document.getElementById('modalVideo');
            videoEl.pause();
            videoEl.src = '';
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', e => {
            searchQuery = e.target.value;
            renderGallery();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.quality;
                renderGallery();
            });
        });

        document.getElementById('gridView').addEventListener('click', () => {
            document.getElementById('gallery').classList.remove('list-view');
            document.getElementById('gridView').classList.add('active');
            document.getElementById('listView').classList.remove('active');
        });

        document.getElementById('listView').addEventListener('click', () => {
            document.getElementById('gallery').classList.add('list-view');
            document.getElementById('listView').classList.add('active');
            document.getElementById('gridView').classList.remove('active');
        });

        document.getElementById('languageSelect').addEventListener('change', e => loadData(e.target.value));

        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('videoModal').addEventListener('click', e => {
            if (e.target.id === 'videoModal') closeModal();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });

        // Initialize
        loadData('en-US');
    </script>
</body>
</html>
